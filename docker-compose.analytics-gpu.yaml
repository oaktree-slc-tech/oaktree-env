version: "2.3"

services:
  
  jupyter:
    image: code.oak-tree.tech:5005/courseware/oak-tree/dataops-examples/spark301-cv
    volumes:
    - ./.local:/home/jovyan/
    - ./local:/home/jovyan/work/
    environment:
      OBJECTS_ENDPOINT: "http://object-storage:9000"
      OBJECTS_CONTAINER: playground 
      OBJECTS_SECRET: "jupyter@analytics"
      OBJECTS_ACCESSID: "jupyter"
      JUPYTER_ALLOW_INSECURE_WRITES: "true"
    command: ["jupyter", "lab", "--ip", "0.0.0.0"]
    runtime: nvidia
    ports:
    - 8888:8888
    - 4040:4040
    extra_hosts:
    - "imaging:192.168.10.10"
    - "object-storage:192.168.10.10"
    - "kafka:192.168.10.10"
    - "zookeeper:192.168.10.10"