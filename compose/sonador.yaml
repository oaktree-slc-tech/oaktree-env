version: "2.1"
services:

  # Sonador PostgreSQL instance
  sonador-db:
    image: postgres:16
    volumes:
    - sonador-postgres:/var/lib/postgresql/data/pgdata
    environment:
      POSTGRES_PASSWORD: images-control@medical-db
      POSTGRES_USER: postgres
      POSTGRES_DB: sonador
      PGDATA: /var/lib/postgresql/data/pgdata
  
  # Sonador Web Application
  imaging:
    image: sonador-agentic
    ports:
    - 8070:8070
    volumes:
    - ../config/sonador:/srv/www/sonador/config
    - ../data/sonador/docroot/:/srv/www/sonador/docroot
    # Uncomment the line below to mount a local checkout of the Sonador Web Application
    # sources staged in ../src/sonador to enable local development.
    - ../src/sonador:/srv/www/sonador/sonador
    environment:
      SONADOR_SITECONFIG: "/srv/www/sonador/config/sonador.site.config"
      DJANGO_SETTINGS_MODULE: "sonador.settings.devel"
      SONADOR_SERVER_HOSTNAME: imaging.local
      SONADOR_SERVER_DESCRIPTION: "Sonador Development"
      SONADOR_USERNAME: dev01
      SONADOR_USER_FIRST_NAME: Development
      SONADOR_USER_LAST_NAME: User
      SONADOR_USER_EMAIL: "dev01@example.com"
      SONADOR_USER_PASSWORD: "sonador@development-env"
      SECURE_API_APITOKEN: "secure-api@sonador-dev"

volumes:
  sonador-postgres:
