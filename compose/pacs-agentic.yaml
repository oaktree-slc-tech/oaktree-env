version: "2.1"
services:

  orthanc-db:
    image: pgvector/pgvector:pg16
    volumes:
    - orthanc-agentic-postgres:/var/lib/postgresql/data/pgdata
    environment:
      POSTGRES_PASSWORD: images-meta@medical-db
      POSTGRES_USER: postgres
      POSTGRES_DB: images
      PGDATA: /var/lib/postgresql/data/pgdata

  orthanc-init-db:
    image: orthanc-agentic
    volumes:
    - ../config/orthanc/config.web-auth.json:/etc/orthanc/orthanc.json:ro
    - ../config/orthanc/config.python.json:/etc/orthanc/orthanc-python.json:ro
    depends_on:
      orthanc-db:
        condition: service_started
    entrypoint: ["bash", "-c"]
    command:
    - cd /opt/orthanc/orthanc-sonador && alembic upgrade head

  orthanc:
    image: orthanc-agentic
    ports:
    - 4242:4242
    - 8042:8042
    volumes:
    - ../config/orthanc/config.web-auth.json:/etc/orthanc/orthanc.json:ro
    - ../config/orthanc/config.python.json:/etc/orthanc/orthanc-python.json:ro
    # Uncomment the line below to mount a local checkout of the Orthanc Sonador Plugin
    # sources staged in../src/orthanc-sonador to enable local development.
    - ../src/orthanc-sonador:/opt/orthanc/orthanc-sonador
    environment:
      POSTGRESQL_PLUGIN_ENABLED: "true"
      PYTHON_PLUGIN_ENABLED: "true"
      DICOM_WEB_PLUGIN_ENABLED: "true"
      AUTHORIZATION_PLUGIN_ENABLED: "true"
      AWS_S3_STORAGE_PLUGIN_ENABLED: "false"
      OHIF_PLUGIN_ENABLED: "true"
    depends_on:
      orthanc-db:
        condition: service_started
      orthanc-init-db:
        condition: service_completed_successfully
  
  nginx:
   image: nginx:1.17
   restart: always
   ports:
   - 8842:80
   volumes:
   - ../config/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
   depends_on:
   - orthanc-db
   - orthanc


volumes:
  orthanc-agentic-postgres:
