version: "2.1"
services:

  orthanc-db:
    image: postgres:11
    environment:
      POSTGRES_PASSWORD: images-meta@medical-db
      POSTGRES_USER: postgres
      POSTGRES_DB: images
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
    - 65432:5432

  orthanc:
    image: code.oak-tree.tech:5005/oak-tree/medical-imaging/imaging-development-env/orthanc-sonador
    ports:
    - 4242:4242
    - 8042:8042
    volumes:
    - ../config/orthanc/config.web-auth.json:/etc/orthanc/orthanc.json:ro
    - ../config/orthanc/config.python.json:/etc/orthanc/orthanc-python.json:ro
    environment:
      POSTGRESQL_PLUGIN_ENABLED: "true"
      PYTHON_PLUGIN_ENABLED: "true"
      DICOM_WEB_PLUGIN_ENABLED: "true"
      AUTHORIZATION_PLUGIN_ENABLED: "true"
    
