version: "2.1"
services:

  orthanc-db:
    image: postgres:11
    volumes:
    - orthanc-postgres:/var/lib/postgresql/data/pgdata
    environment:
      POSTGRES_PASSWORD: images-meta@medical-db
      POSTGRES_USER: postgres
      POSTGRES_DB: images
      PGDATA: /var/lib/postgresql/data/pgdata

  orthanc-init-db:
    image: oaktreetech/orthanc-sonador:0.4-alpha3
    volumes:
    - ../config/orthanc/config.web-auth.json:/etc/orthanc/orthanc.json:ro
    - ../config/orthanc/config.python.json:/etc/orthanc/orthanc-python.json:ro
    depends_on:
      orthanc-db:
        condition: service_started
    entrypoint: ["bash", "-c"]
    command:
    - cd /opt/orthanc/orthanc-sonador && sleep 7 && alembic upgrade head

  orthanc:
    image: oaktreetech/orthanc-sonador:0.4-alpha4
    ports:
    - 4242:4242
    - 8042:8042
    volumes:
    - ../config/orthanc/config.web-auth.json:/etc/orthanc/orthanc.json:ro
    - ../config/orthanc/config.python.json:/etc/orthanc/orthanc-python.json:ro
    - ../src/orthanc-sonador:/opt/orthanc/orthanc-sonador
    environment:
      POSTGRESQL_PLUGIN_ENABLED: "true"
      PYTHON_PLUGIN_ENABLED: "true"
      DICOM_WEB_PLUGIN_ENABLED: "true"
      AWS_S3_STORAGE_PLUGIN_ENABLED: "false"
      OHIF_PLUGIN_ENABLED: "true"
      AUTHORIZATION_PLUGIN_ENABLED: "true"
    depends_on:
      orthanc-db:
        condition: service_started

  nginx:
   image: nginx:1.17
   restart: always
   ports:
   - 8842:80
   volumes:
   - ../config/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  orthanc-postgres:

