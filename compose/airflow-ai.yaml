# Airflow 3.0 cluster configuration for CeleryExecutor with RabbitMQ and PostgreSQL.
#
# WARNING: This configuration is for local development. Do not use it in a production deployment.
#
# Airflow 3.0 Breaking Changes Applied:
#   - webserver command removed -> api-server
#   - Added dag-processor service (recommended for Airflow 3.0)
#   - Added triggerer service for deferrable tasks
#   - Updated health checks for new API endpoints
#   - Added EXECUTION_API_SERVER_URL for inter-service communication
#
# Environment variables supported:
#   AIRFLOW_IMAGE_NAME         - Docker image name used to run Airflow.
#   AIRFLOW_UID                - User ID in Airflow containers (Default: 50000)
#   AIRFLOW_GID                - Group ID in Airflow containers (Default: 0)
#   _AIRFLOW_WWW_USER_USERNAME - Username for the administrator account.
#   _AIRFLOW_WWW_USER_PASSWORD - Password for the administrator account.
#
---
version: '2.3'

x-airflow-common:
  &airflow-common
  image: oaktreetech/sonador-airflow.ai
  environment:
    &airflow-common-env

    # Celery task runner and results database
    AIRFLOW__CORE__EXECUTOR: CeleryExecutor
    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: http://airflow-webserver:8080/execution/
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
    AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://airflow:airflow@airflow-postgres/airflow
    AIRFLOW__CELERY__BROKER_URL: amqp://guest:guest@message-broker:5672
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'

    # API configuration
    AIRFLOW__CORE__FERNET_KEY: 'ZmDfcTF7_60GrrY167zsiPd67pEvs0aGOv2oasOM1Pg='
    AIRFLOW__API__SECRET_KEY: 'sonador.airflow-api-secret'
    AIRFLOW__API_AUTH__JWT_SECRET: 'sonador.airflow-api-secret'
    AIRFLOW__CORE__AUTH_MANAGER: sonador_auth.SonadorFabAuthManager
    AIRFLOW__API__APP_MIDDLEWARE: sonador_auth.SonadorHeaderMiddleware
    AIRFLOW__FAB__CONFIG_FILE: /home/airflow/.local/lib/python3.10/site-packages/sonador_sso.py

    # Airflow Remote Logging Configuration (S3 Object Storage)    
    AIRFLOW__LOGGING__REMOTE_LOGGING: "true"
    AIRFLOW__LOGGING__REMOTE_BASE_LOG_FOLDER: "s3://airflow-logs"
    AIRFLOW__LOGGING__REMOTE_LOG_CONN_ID: s3_default
    AIRFLOW__LOGGING__ENCRYPT_S3_LOGS: "false"

    # Sonador API / Data Service
    SONADOR_URL: "http://imaging:8070"
    SONADOR_APITOKEN: "secure-api@sonador-dev"
    SONADOR_SERVICE_CLIENT_ID: 'airflow'

  volumes:
  # Volumes include a runtime for the main Airflow installation (under /home/airflow/.local)
  # as well as a second virtual environment for Total Segmentator located at /home/airflow/env/totalsegmentator.
  - ../data/airflow/dags/io:/opt/airflow/dags/sonador
  - ../data/airflow/dags/ai:/opt/airflow/dags/ai
  - ../data/airflow/logs:/opt/airflow/logs
  - ../data/airflow/plugins:/opt/airflow/plugins

  # Sonador authentication and hooks (main env)
  - ../docker/airflow/src/airflow-api.sonador_auth.py:/home/airflow/.local/lib/python3.10/site-packages/sonador_auth.py:ro
  - ../docker/airflow/src/airflow-api.sonador_hook.py:/home/airflow/.local/lib/python3.10/site-packages/sonador_hook.py:ro
  - ../docker/airflow/src/sonador-sso.webserver_config.py:/home/airflow/.local/lib/python3.10/site-packages/sonador_sso.py:ro
  - ../docker/airflow/src/airflow-api.object_storage_hook.py:/home/airflow/.local/lib/python3.10/site-packages/object_storage_hook.py:ro

  # Total Segmentator env
  - ../data/totalsegmentator:/home/airflow/.totalsegmentator  
  - ../docker/airflow/src/airflow-totalsegmentator.execute.py:/home/airflow/env/totalsegmentator/bin/airflow-totalsegmentator.execute.py:ro

  user: "${AIRFLOW_UID:-50000}:${AIRFLOW_GID:-0}"
  depends_on:
  - airflow-postgres


services:

  airflow-postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
    - postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 5
    restart: always

  airflow-webserver:
    <<: *airflow-common
    command: api-server
    ports:
    - 8060:8080
    healthcheck:      
      interval: 10s
      timeout: 10s
      retries: 5
    restart: always

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    healthcheck:
      test: ["CMD-SHELL", 'airflow jobs check --job-type SchedulerJob --hostname "$${HOSTNAME}"']
      interval: 10s
      timeout: 10s
      retries: 5
    restart: always

  airflow-worker:
    <<: *airflow-common
    command: celery worker
    healthcheck:
      test:
      - "CMD-SHELL"
      - 'celery --app airflow.executors.celery_executor.app inspect ping -d "celery@$${HOSTNAME}"'
      interval: 10s
      timeout: 10s
      retries: 5
    restart: always

  airflow-init:
    <<: *airflow-common
    command: version
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_MIGRATE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'

  airflow-triggerer:
    <<: *airflow-common
    command: triggerer
    healthcheck:
      test: ["CMD-SHELL", 'airflow jobs check --job-type TriggererJob --hostname "$${HOSTNAME}"']
      interval: 10s
      timeout: 10s
      retries: 5
    restart: always

  airflow-dag-processor:
    <<: *airflow-common
    command: dag-processor
    healthcheck:
      test: ["CMD-SHELL", 'airflow jobs check --job-type DagProcessorJob --hostname "$${HOSTNAME}"']
      interval: 10s
      timeout: 10s
      retries: 5
    restart: always

  flower:
    <<: *airflow-common
    command: celery flower
    ports:
    - 5555:5555
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:5555/"]
      interval: 10s
      timeout: 10s
      retries: 5
    restart: always

volumes:
  postgres-db-volume:
