# Airflow 3.0 cluster configuration for CeleryExecutor with RabbitMQ and PostgreSQL.
#
# WARNING: This configuration is for local development. Do not use it in a production deployment.
#
# Airflow 3.0 Breaking Changes Applied:
#   - webserver command removed -> api-server
#   - Added dag-processor service (recommended for Airflow 3.0)
#   - Added triggerer service for deferrable tasks
#   - Updated health checks for new API endpoints
#   - Added EXECUTION_API_SERVER_URL for inter-service communication
#
# Environment variables supported:
#   AIRFLOW_IMAGE_NAME         - Docker image name used to run Airflow.
#   AIRFLOW_UID                - User ID in Airflow containers (Default: 50000)
#   AIRFLOW_GID                - Group ID in Airflow containers (Default: 0)
#   _AIRFLOW_WWW_USER_USERNAME - Username for the administrator account.
#   _AIRFLOW_WWW_USER_PASSWORD - Password for the administrator account.
#
---
version: '3.0'

x-airflow-common:
  &airflow-common
  image: registry.oak-tree.tech/oak-tree/medical-imaging/agentic-ai:airflow
  environment:
    &airflow-common-env
    # Core Airflow Configuration
    AIRFLOW__CORE__EXECUTOR: CeleryExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
    AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://airflow:airflow@airflow-postgres/airflow
    AIRFLOW__CELERY__BROKER_URL: amqp://guest:guest@message-broker:5672
    AIRFLOW__CORE__FERNET_KEY: 'ZmDfcTF7_60GrrY167zsiPd67pEvs0aGOv2oasOM1Pg='
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'

    # Airflow 3.0: JWT secret for internal API authentication (must be same across all services)
    AIRFLOW__API_AUTH__JWT_SECRET: 'sonador-airflow-jwt-secret-key-for-dev-environment-only'

    # Airflow 3.0: Execution API Server URL for inter-service communication
    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: 'http://airflow-apiserver:8080/execution/'

    # Authentication
    AIRFLOW__API__AUTH_BACKENDS: 'sonador_auth'
    _AIRFLOW_WWW_USER_USERNAME: 'dev01'
    _AIRFLOW_WWW_USER_PASSWORD: 'sonador@development-env'

    # SONADOR Integration
    SONADOR_URL: "http://imaging:8070"
    SONADOR_APITOKEN: "secure-api@sonador-dev"
    SONADOR_SERVICE_CLIENT_ID: 'scoaDDZzCwpMPrrx'

    # Airflow 3.0: Connection names for DAG parameter dropdowns
    # (Database queries not allowed during DAG parsing)
    SONADOR_CONNECTIONS: "sonador_default"
    S3_CONNECTIONS: "s3_default"

    AIRFLOW__LOGGING__REMOTE_LOGGING: "true"
    AIRFLOW__LOGGING__REMOTE_BASE_LOG_FOLDER: "s3://airflow-logs"
    AIRFLOW__LOGGING__REMOTE_LOG_CONN_ID: s3_default
    AIRFLOW__LOGGING__ENCRYPT_S3_LOGS: "false"

    # Docker Model Runner LLM Integration (Docker Desktop built-in)
    # From containers: http://model-runner.docker.internal/
    # From host (TCP): http://localhost:12434/
    OPENAI_API_BASE: "http://model-runner.docker.internal/engines/llama.cpp/v1"
    OPENAI_API_KEY: "not-needed"
    LLM_MODEL: "ai/llama3.2:3B-Q4_0"
    EMBED_MODEL: "ai/mxbai-embed-large:latest"

  volumes:
  # Volumnes include a runtime for the main Airflow installation (under /home/aiflow/.local)
  # as well as a second virtual environment for Total Segmentator located at /home/airflow/env/totalsegmentator.
  - ../data/airflow/dags/io:/opt/airflow/dags/sonador
  - ../data/airflow/dags/ai:/opt/airflow/dags/ai
  - ../data/airflow/logs:/opt/airflow/logs
  - ../data/airflow/plugins:/opt/airflow/plugins

  # Sonador authentication and hooks (main env)
  - ../docker/airflow/airflow-api.sonador_auth.py:/home/airflow/.local/lib/python3.10/site-packages/sonador_auth.py:ro
  - ../docker/airflow/airflow-api.sonador_hook.py:/home/airflow/.local/lib/python3.10/site-packages/sonador_hook.py:ro
  - ../docker/airflow/airflow-api.object_storage_hook.py:/home/airflow/.local/lib/python3.10/site-packages/object_storage_hook.py:ro  

  # Total Segmentator env
  - ../data/totalsegmentator:/home/airflow/.totalsegmentator  
  - ../docker/airflow/airflow-api.sonador_auth.py:/home/airflow/env/totalsegmentator/lib/python3.10/site-packages/sonador_auth.py:ro
  - ../docker/airflow/airflow-api.sonador_hook.py:/home/airflow/env/totalsegmentator/lib/python3.10/site-packages/sonador_hook.py:ro
  - ../docker/airflow/airflow-api.object_storage_hook.py:/home/airflow/env/totalsegmentator/lib/python3.10/site-packages/object_storage_hook.py:ro
  - ../docker/airflow/airflow-totalsegmentator.execute.py:/home/airflow/env/totalsegmentator/bin/airflow-totalsegmentator.execute.py:ro

  user: "${AIRFLOW_UID:-50000}:${AIRFLOW_GID:-0}"
  extra_hosts:
  - "host.docker.internal:host-gateway"
  depends_on:
  - airflow-postgres


services:

  airflow-postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
    - postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 5
    restart: always

  # Airflow 3.0: webserver replaced with api-server
  airflow-apiserver:
    <<: *airflow-common
    command: api-server
    ports:
    - 8060:8080
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/api/v2/version"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: always

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: always

  # Airflow 3.0: DAG Processor service (parses DAG files)
  airflow-dag-processor:
    <<: *airflow-common
    command: dag-processor
    healthcheck:
      test: ["CMD-SHELL", 'airflow jobs check --job-type DagProcessorJob --hostname "$${HOSTNAME}"']
      interval: 30s
      timeout: 10s
      retries: 5
    restart: always

  # Airflow 3.0: Triggerer service (for deferrable tasks)
  airflow-triggerer:
    <<: *airflow-common
    command: triggerer
    healthcheck:
      test: ["CMD-SHELL", 'airflow jobs check --job-type TriggererJob --hostname "$${HOSTNAME}"']
      interval: 30s
      timeout: 10s
      retries: 5
    restart: always

  airflow-worker:
    <<: *airflow-common
    command: celery worker
    healthcheck:
      test:
      - "CMD-SHELL"
      - 'celery --app airflow.providers.celery.executors.celery_executor.app inspect ping -d "celery@$${HOSTNAME}"'
      interval: 30s
      timeout: 10s
      retries: 5
    restart: always
    environment:
      <<: *airflow-common-env
      # Airflow 3.0: Required for proper signal handling in celery workers
      DUMB_INIT_SETSID: "0"
    deploy:
      resources:
        limits:
          memory: 16G

    # Increase shared memory to allow worker to support segmentation tasks
    shm_size: 8gb

  airflow-init:
    <<: *airflow-common
    command: version
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_MIGRATE: 'true'
      _AIRFLOW_DB_UPGRADE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: ${_AIRFLOW_WWW_USER_USERNAME:-airflow}
      _AIRFLOW_WWW_USER_PASSWORD: ${_AIRFLOW_WWW_USER_PASSWORD:-airflow}

  flower:
    <<: *airflow-common
    command: celery flower
    ports:
    - 5555:5555
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:5555/"]
      interval: 10s
      timeout: 10s
      retries: 5
    restart: always

  # NOTE: LLM inference is provided by Docker Model Runner (built into Docker Desktop)
  # No separate Ollama service needed. Enable in Docker Desktop Settings.
  # Models are pulled automatically on first use:
  #   docker model pull ai/llama3.2:3B-Q8_0
  #   docker model pull ai/mxbai-embed-large

volumes:
  postgres-db-volume:
