version: '3.8'
services:

  kaitara-db:
    image: postgis/postgis:14-3.3-alpine
    volumes:
      - kaitara-postgres:/var/lib/postgresql/data/pgdata
    environment:
      POSTGRES_PASSWORD: web-control@kaitara
      POSTGRES_USER: postgres
      POSTGRES_DB: kaitara
      PGDATA: /var/lib/postgresql/data/pgdata
      KAITARA_SITECONFIG: "/srv/www/kaitara/config/kaitara.config.yaml"
      DJANGO_SETTINGS_MODULE: "kaitara.settings.dev"
      POSTGRES_HOST: kaitara-db
      POSTGRES_PORT: 5432
    ports:
      - "5432:5432"
    expose:
      - 5432
    networks:
      - kaitara-postgres-network

  kaitara:
    image: kaitara-new:latest
    ports:
      - 8000:8000
    environment:
      KAITARA_SITECONFIG: "/srv/www/kaitara/config/kaitara.config.yaml"
      DJANGO_SETTINGS_MODULE: "kaitara.settings.dev"
    volumes:
      - ../config/kaitara:/srv/www/kaitara/config

    command: [ "/srv/www/kaitara/config/entrypoint.sh" ]

    depends_on:
    - kaitara-db

    networks:
      - kaitara-postgres-network

volumes:
  kaitara-postgres:

networks:
  kaitara-postgres-network: