kind: ConfigMap
apiVersion: v1
metadata:
  namespace: imaging
  name: sonador-config
data:
  config: |
    [Site-Config]
    SITE_ID = 1 # ID for the currently active site (primary key of the domain in the Django sites framework)
    SITE_HAME = 'imaging.example.com'       # Domain of the website
    SECRET_KEY = '7aym(_quqz-op5eo#oit9y_zb71b@15)jc_l+lohhwu@x5x4b6'   # Secret Key for install, REPLACE prior to deployment
    INTERNAL_IPS = '*',
    ALLOWED_HOSTS = '127.0.0.1', '.oak-tree.tech', '.oak-tree.us', 'sonador'
    LOG_LEVEL_ROOT = 'info'     # Level of log detail: DEBUG, INFO, ERROR
    LOG_LEVEL_CONSOLE = 'info'  # Level of log detail to output to console: DEBUG, INFO, ERROR
    [Site-Connection]
    SITE_CONNECT_SCHEME = 'http' # Site connection scheme (production)
    SITE_CONNECT_PORT = '80' # If different from http/https defaults (80/443)
    SITE_CONNECT_SCHEME_DEVEL = 'http' # Connection connection scheme (development)
    SITE_CONNECT_PORT_DEVEL = '80' # Connection port (development)
    BASE_URL = 'http://imaging.example.com'
    [Localization]
    TIME_ZONE = 'America/Denver'
    LANGUAGE_CODE = 'en-us'
    [Databases]
    [[default]]
    ENGINE = 'django.db.backends.postgresql_psycopg2'
    NAME = 'sonador'
    USER = 'postgres'
    PASSWORD = 'images-control-password@medical-db'
    HOST = 'sonador-db-postgresql'
    PORT =  '5432'
    [Database-Migrations]
    secure = dbmigrations.secure
    wgtsocial = dbmigrations.wgtauth.social
    wgtregistration = dbmigrations.wgtauth.registration
    visionaire = dbmigrations.visionaire
    auth = dbmigrations.auth
    [Authentication]
    AUTH_ENABLED = True
    [Resource-Files]
    STATIC_ROOT = /srv/www/sonador/docroot/static/
    MEDIA_ROOT = /srv/www/sonador/docroot/media/
    [Storage]
    OBJECT_STORAGE_TYPE = 's3-minio'
    [S3]
    AWS_S3_SERVICE_URL = 'http://storage.example.com:9000'
    AWS_S3_ACCESS_ID = 'imaging-user'
    AWS_S3_SECRET_KEY = 'imaging-secret@minio-storage'
    AWS_S3_CONTAINER = 'sonador-dev'
    AWS_S3_REGION = 'us-east-1'
    AWS_S3_STATIC_CONTAINER = 'sonador-dev-static'
    AWS_S3_MEDIA_CONTAINER = 'sonador-dev'
