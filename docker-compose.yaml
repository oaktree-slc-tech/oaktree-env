version: "2.1"
services:

  jupyter:
    image: code.oak-tree.tech:5005/courseware/oak-tree/dataops-examples/spark245-k8s-lm 
    volumes:
    - ./.local:/home/jovyan/
    - ./local:/home/jovyan/work/
    environment:
      OBJECTS_ENDPOINT: "http://object-storage:9000"
      OBJECTS_CONTAINER: playground 
      OBJECTS_SECRET: "jupyter@analytics"
      OBJECTS_ACCESSID: "jupyter"
    command: ["jupyter", "lab", "--ip", "0.0.0.0"]
    ports:
    - 8888:8888
    - 4040:4040

  db:
    image: postgres:11
    volumes:
    - ./data/postgres/data:/var/lib/postgresql/data/pgdata
    environment:
      POSTGRES_PASSWORD: images-meta@medical-db
      POSTGRES_USER: postgres
      POSTGRES_DB: images
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
    - 65432:5432

  object-storage:
    image: minio/minio
    volumes:
    - ./data/minio:/data
    environment:
      MINIO_ACCESS_KEY: "jupyter"
      MINIO_SECRET_KEY: "jupyter@analytics"
    command:
    - server
    - /data
    ports:
    - 9000:9000

  orthanc:
    image: code.oak-tree.tech:5005/oak-tree/medical-imaging/imaging-development-env/orthanc-s3
    ports:
    - 4242:4242
    - 8042:8042
    volumes:
    - ./config/orthanc/config.json:/etc/orthanc/orthanc.json:ro
    environment:
      POSTGRESQL_PLUGIN_ENABLED: "true"
      PYTHON_PLUGIN_ENABLED: "true"
      DICOM_WEB_PLUGIN_ENABLED: "true"

  zookeeper:
    image: code.oak-tree.tech:5005/courseware/oak-tree/dataops-examples/zookeeper
    restart: always
    ports:
    - 2181:2181

  kafka:
    image: code.oak-tree.tech:5005/courseware/oak-tree/dataops-examples/kafka
    restart: always
    ports:
    - 9092:9092
    environment:
      KAFKA_ADVERTISED_HOST_NAME: kafka 
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
  
  nginx:
    image: nginx:1.17
    restart: always
    ports:
    - 8842:80
    volumes:
    - ./config/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

