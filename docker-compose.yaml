version: "2.1"
services:

  jupyter:
    image: code.oak-tree.tech:5005/courseware/oak-tree/dataops-examples/spark245-k8s-beakerx
    volumes:
    - ./.local:/home/jovyan/
    - ./local:/home/jovyan/work/
    environment:
      OBJECTS_ENDPOINT: "http://object-storage:9000"
      OBJECTS_CONTAINER: web-age
      OBJECTS_SECRET: "jupyter@analytics"
      OBJECTS_ACCESSID: "jupyter"
    command: ["jupyter", "lab", "--ip", "0.0.0.0"]
    ports:
    - 8888:8888
    - 4040:4040

  object-storage:
    image: minio/minio
    volumes:
    - ./data:/data
    environment:
      MINIO_ACCESS_KEY: "jupyter"
      MINIO_SECRET_KEY: "jupyter@analytics"
    command:
    - server
    - /data
    ports:
    - 9000:9000

  zookeeper:
    image: code.oak-tree.tech:5005/courseware/oak-tree/dataops-examples/zookeeper
    restart: always
    ports:
      - 2181:2181

  kafka:
    image: code.oak-tree.tech:5005/courseware/oak-tree/dataops-examples/kafka
    restart: always
    ports:
      - 9092:9092
    environment:
      KAFKA_ADVERTISED_HOST_NAME: kafka 
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
